<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인사이드 세팅 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * { box-sizing: border-box; }

        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; max-width: 1000px; margin: 0 auto; padding: 30px 20px; background-color: #1e1e1e; color: #e0e0e0; line-height: 1.6; }
        h2 { color: #ffffff; text-align: center; font-weight: 800; margin-bottom: 30px; letter-spacing: -0.5px; position: relative; }
        
        .upload-section, .result-section { background: #252525; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); margin-bottom: 25px; border: 1px solid #333; }
        
        #imagePreview { width: 100%; height: auto; margin-top: 15px; border-radius: 8px; display: none; border: 1px solid #444; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #processedPreview { max-width: 100%; max-height: 300px; margin-top: 15px; border-radius: 8px; display: none; }
        
        button { background: #5c9d46; color: white; padding: 16px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 20px; font-weight: bold; width: 100%; box-shadow: 0 4px 10px rgba(92, 157, 70, 0.2); transition: all 0.2s ease; }
        button:hover { background: #4d8639; transform: translateY(-2px); }
        button:disabled { background: #333333; box-shadow: none; transform: none; cursor: not-allowed; color: #666666; }
        #status { margin-top: 20px; color: #94a3b8; font-weight: bold; text-align: center; font-size: 15px; }
        
        .groups-wrapper { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; align-items: stretch; }
        .group { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid; border-left-width: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .group-1 { border-color: #ff4757; } 
        .group-2 { border-color: #ffa502; } 
        .group-3 { border-color: #2ed573; } 
        
        .group-header { display: flex; flex-direction: column; align-items: flex-start; border-bottom: 1px solid #333; padding-bottom: 12px; margin-bottom: 15px; gap: 8px; }
        .dragon-title { font-size: 18px; font-weight: 800; color: #ffffff; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .dragon-type { font-size: 12px; color: #94a3b8; font-weight: normal; }
        .dragon-icon { width: 24px; height: 24px; vertical-align: middle; border-radius: 4px; object-fit: cover; }
        
        .badges-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; align-items: flex-start; }
        .eval-badge { background-color: #2563eb; color: white; padding: 5px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; }
        .badge-success { background-color: #059669; color: white; padding: 5px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; }
        .grade-badge { background-color: #854d0e; color: #fef08a; padding: 5px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; border: 1px solid #ca8a04; }
        
        .buff-info { background-color: #332b00; color: #ffd54f; padding: 12px 16px; border-radius: 8px; font-size: 15px; margin-bottom: 20px; border: 1px solid #b08d00; display: flex; align-items: center; justify-content: center; font-weight: 600; }
        
        .stat-container { display: flex; gap: 8px; justify-content: space-between; margin-bottom: 15px; align-items: stretch; }
        .stat-box { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px 4px; border-radius: 6px; text-align: center; font-size: 12px; font-weight: bold; line-height: 1.2; }
        .stat-hp { background-color: #2a1111; border: 1px solid #5c2222; color: #ff8a8a; }
        .stat-atk { background-color: #2a1c0d; border: 1px solid #6b431a; color: #ffa756; }
        .stat-def { background-color: #112a1a; border: 1px solid #1f5c35; color: #6ee7b7; }
        .stat-box b { font-size: 18px; display: block; margin-top: 4px; color: #ffffff; letter-spacing: 0.5px; }
        
        .stat-buff-plus { color: #4ade80; font-weight: bold; font-size: 12px; margin-top: 4px; min-height: 14px; }
        .stat-buff-minus { color: #f87171; font-weight: bold; font-size: 12px; margin-top: 4px; min-height: 14px; }

        .bival-box { text-align: center; background: #1e253c; padding: 12px; border-radius: 6px; border: 1px dashed #374151; margin-top: auto; }
        .bival-label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; display: block; }
        .bival-box span.bival-score { color: #ffffff; font-size: 20px; font-weight: bold; }
        
        .total-bival-box { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; padding: 25px; border-radius: 12px; text-align: center; margin-top: 15px; font-size: 22px; font-weight: 900; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .total-bival-box span { font-size: 32px; display: block; margin-top: 8px; color: #fef08a; }

        .submit-section { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .submit-section input { padding: 10px 15px; border-radius: 6px; border: 1px solid #444; background: #1e1e1e; color: white; font-size: 15px; font-family: inherit; width: 200px; font-weight: bold;}
        .submit-section button { margin-top: 0; width: auto; padding: 10px 20px; background: #f59e0b; font-size: 15px; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.2); }
        .submit-section button:hover { background: #d97706; }

        .leaderboard-btn { position: absolute; right: 0; top: 0; width: auto; margin-top: 0; padding: 10px 15px; font-size: 14px; background: #3b82f6; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); }
        .leaderboard-btn:hover { background: #2563eb; }
        
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-content { background-color: #1e1e1e; margin: 10% auto; padding: 25px; border: 1px solid #444; border-radius: 12px; width: 95%; max-width: 700px; max-height: 80vh; overflow-y: auto; color: white; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .close-btn { color: #94a3b8; float: right; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 1; margin-top: -5px; }
        .close-btn:hover { color: #fff; }
        
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; table-layout: fixed; }
        .rank-table th, .rank-table td { padding: 12px 4px; border-bottom: 1px solid #333; text-align: center; vertical-align: middle; }
        .rank-table th { color: #94a3b8; font-weight: bold; border-bottom: 2px solid #444; }
        
        .rank-td-cell { font-weight: bold; font-size: 15px; color: #ffffff; }
        .score-text { color: #a7f3d0; font-weight: bold; font-size: 15px; letter-spacing: -0.5px; }
        .nickname-text { font-weight: bold; font-size: 15px; word-break: break-all; }
        
        .leaderboard-medal-icon { width: 24px; height: 24px; vertical-align: middle; object-fit: contain; }
        .leaderboard-dragon-icon { width: 22px; height: 22px; vertical-align: middle; border-radius: 4px; margin: 0 2px; object-fit: cover; }
        .nickname-container { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
        
        .buff-badge { padding: 4px 8px; border-radius: 6px; font-size: 13px; font-weight: 900; display: inline-block; text-shadow: 0px 1px 2px rgba(0,0,0,0.3); white-space: nowrap; }
        .buff-6 { background-color: #ef4444; color: white; } 
        .buff-5 { background-color: #f97316; color: white; } 
        .buff-4 { background-color: #facc15; color: #1e1e1e; text-shadow: none; } 
        .buff-3 { background-color: #22c55e; color: white; } 
        .buff-2 { background-color: #3b82f6; color: white; } 
        .buff-1 { background-color: #a855f7; color: white; } 
        .buff-0 { background-color: transparent; color: #94a3b8; border: 1px solid #444; text-shadow: none; } 

        .detail-toggle-btn { background: #4f46e5; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; margin-top: 0; white-space: nowrap; }
        .detail-toggle-btn:hover { background: #4338ca; }
        .details-row td { background: #151515; padding: 15px 10px; border-bottom: 2px solid #444; }
        .details-container { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .detail-card { background: #252525; border: 1px solid #333; border-radius: 8px; padding: 10px; flex: 1; min-width: 140px; font-size: 12px; text-align: center; }
        .detail-card span.d-name { display: block; color: #94a3b8; margin-bottom: 6px; font-size: 12px; font-weight: bold; }
        .detail-card b { color: #fff; font-size: 13px; }
        .detail-bival { display: block; margin-top: 8px; padding-top: 6px; border-top: 1px dashed #444; color: #a7f3d0; font-weight: bold; font-size: 13px; }

        .pre-select-area { display: none; margin-top: 25px; padding: 25px; background-color: #1a1a1a; border-radius: 12px; border: 1px solid #333; }
        .pre-select-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; } 
        .pre-select-item { display: flex; flex-direction: column; background: #252525; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        .pre-select-item label { font-weight: 800; margin-bottom: 12px; color: #cbd5e1; font-size: 15px; text-align: center; border-bottom: 1px solid #444; padding-bottom: 8px; }
        .input-row { display: flex; flex-direction: column; gap: 10px; } 
        .autocomplete-wrapper { position: relative; width: 100%; }
        .dragon-search, .grade-select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; background-color: #1e1e1e; font-family: inherit; font-size: 14px; font-weight: bold; box-sizing: border-box; color: #eee; }
        .dragon-search:focus, .grade-select:focus { outline: none; border-color: #3b82f6; }
        .autocomplete-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #2c2c2c; border: 1px solid #444; z-index: 1000; max-height: 200px; overflow-y: auto; border-radius: 6px; display: none; }
        .autocomplete-item { padding: 12px 14px; cursor: pointer; border-bottom: 1px solid #444; font-size: 14px; color: #cbd5e1; }
        .autocomplete-item:hover { background-color: #3d3d3d; font-weight: bold; color: #60a5fa; }

        .toggle-debug-btn { background: transparent; border: 1px solid #555; color: #94a3b8; padding: 6px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; margin-top: 0; width: auto; font-weight: normal; transition: all 0.2s; }
        .toggle-debug-btn:hover { background: #333; color: #fff; border-color: #777; }

        @media (max-width: 800px) {
            body { padding: 10px 5px; }
            h2 { font-size: 20px; padding-top: 40px; margin-bottom: 20px; }
            
            .leaderboard-btn { position: absolute; right: auto; left: 50%; transform: translateX(-50%); top: 0; width: 90%; font-size: 13px; padding: 8px; }
            .upload-section, .result-section { padding: 15px 5px; border-radius: 8px; }
            
            .pre-select-container, .groups-wrapper { gap: 4px; }
            .pre-select-item { padding: 8px 4px; }
            .pre-select-item label { font-size: 11px; padding-bottom: 6px; margin-bottom: 8px; }
            .dragon-search, .grade-select { padding: 8px 4px; font-size: 11px; }
            .input-row { gap: 6px; }

            .group { padding: 12px 6px; border-left-width: 4px; border-radius: 6px; }
            .group-header { padding-bottom: 8px; margin-bottom: 12px; gap: 4px; }
            .dragon-title { font-size: 11px; gap: 2px; }
            .dragon-type { font-size: 9px; display: block; width: 100%; }
            .dragon-icon { width: 16px; height: 16px; }
            
            .badges-container { gap: 4px; margin-bottom: 12px; }
            .eval-badge, .badge-success, .grade-badge { font-size: 8px; padding: 4px 5px; border-radius: 3px; }
            
            .stat-container { gap: 3px; margin-bottom: 12px; align-items: stretch; } 
            .stat-box { padding: 6px 2px; font-size: 8px; border-radius: 4px; }
            .stat-box b { font-size: 11px; margin-top: 3px; }
            .stat-buff-plus, .stat-buff-minus { font-size: 8px; margin-top: 2px; min-height: 10px; }
            
            .group-header img:not(.dragon-icon) { height: 16px !important; }

            .bival-box { padding: 8px 3px; border-radius: 4px; }
            .bival-label { font-size: 9px; margin-bottom: 2px; }
            .bival-box span.bival-score { font-size: 12px; }
            
            .total-bival-box { padding: 12px 5px; font-size: 16px; margin-top: 15px; border-radius: 6px; }
            .total-bival-box span { font-size: 22px; margin-top: 4px; }

            .modal-content { padding: 15px 4px; width: 98%; }
            .rank-table th, .rank-table td { padding: 6px 1px; font-size: 10px; }
            
            .rank-td-cell { font-size: 11px; }
            .score-text { font-size: 9.5px; word-break: break-all; } 
            .nickname-text { font-size: 10px; }
            
            .nickname-container { flex-direction: column; gap: 2px; }
            .leaderboard-dragon-icon { width: 12px; height: 12px; margin: 0 1px; }
            .leaderboard-medal-icon { width: 16px; height: 16px; }
            
            .buff-badge { font-size: 9px; padding: 2px 4px; } 
            .detail-toggle-btn { padding: 5px 2px; font-size: 9px; width: 95%; }
            
            .submit-section input, .submit-section button { width: 100%; margin-bottom: 5px; }
            .details-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <h2>
        INSIDE 스탯 계산기
        <button id="openLeaderboardBtn" class="leaderboard-btn">🏆 주간 랭킹 (순위표)</button>
    </h2>
    
    <div id="sysNotice" class="buff-info">
        데이터베이스 파일들을 불러오는 중입니다... ⏳
    </div>

    <div id="leaderboardModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h3 style="margin-top: 0; color: #f59e0b; text-align: center;">🏆 주간 랭킹 (순위표)</h3>
            <p style="text-align: center; font-size: 13px; color: #94a3b8; margin-bottom: 15px;">서버에서 데이터를 불러오는 중입니다...</p>
            <div style="overflow-x: auto;">
                <table class="rank-table">
                    <thead>
                        <tr>
                            <th style="width: 13%;">순위</th>
                            <th style="width: 33%;">닉네임 & 덱</th>
                            <th style="width: 14%;">버프</th>
                            <th style="width: 26%;">총합 비밸</th>
                            <th style="width: 14%;">상세</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="upload-section">
        <p style="margin-top:0; font-weight:800; color: #e2e8f0; font-size:15px; margin-bottom:12px;">1. 덱 설정 화면 스크린샷 업로드</p>
        <input type="file" id="imageInput" accept="image/*">
        
        <div style="display:flex; gap: 15px; flex-wrap: wrap;">
            <div style="width: 100%;">
                <img id="imagePreview" alt="원본 이미지">
            </div>
        </div>
        
        <div id="preSelectArea" class="pre-select-area">
            <p style="margin-top:0; font-weight:800; color: #e2e8f0; font-size:15px; margin-bottom:5px;">2. 각 그룹의 드래곤과 등급 지정</p>
            
            <div class="pre-select-container">
                <div class="pre-select-item">
                    <label>그룹 1 (왼쪽)</label>
                    <div class="input-row">
                        <div class="autocomplete-wrapper">
                            <input type="text" class="dragon-search" id="preInput1" autocomplete="off" placeholder="드래곤 이름 검색">
                            <div class="autocomplete-list" id="autoList1"></div>
                        </div>
                        <select class="grade-select" id="preGrade1">
                            <option value="7.0">7.0</option>
                            <option value="8.0">8.0</option>
                            <option value="9.0" selected>9.0</option>
                        </select>
                    </div>
                </div>
                
                <div class="pre-select-item">
                    <label>그룹 2 (가운데)</label>
                    <div class="input-row">
                        <div class="autocomplete-wrapper">
                            <input type="text" class="dragon-search" id="preInput2" autocomplete="off" placeholder="드래곤 이름 검색">
                            <div class="autocomplete-list" id="autoList2"></div>
                        </div>
                        <select class="grade-select" id="preGrade2">
                            <option value="7.0">7.0</option>
                            <option value="8.0">8.0</option>
                            <option value="9.0" selected>9.0</option>
                        </select>
                    </div>
                </div>
                
                <div class="pre-select-item">
                    <label>그룹 3 (오른쪽)</label>
                    <div class="input-row">
                        <div class="autocomplete-wrapper">
                            <input type="text" class="dragon-search" id="preInput3" autocomplete="off" placeholder="드래곤 이름 검색">
                            <div class="autocomplete-list" id="autoList3"></div>
                        </div>
                        <select class="grade-select" id="preGrade3">
                            <option value="7.0">7.0</option>
                            <option value="8.0">8.0</option>
                            <option value="9.0" selected>9.0</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <button id="extractBtn" disabled>3. 이번 주 스탯 계산하기</button>
        <div id="status"></div>
    </div>

    <div class="result-section" id="resultSection" style="display: none;">
        <h3 style="margin-top:0; color:#ffffff; font-weight:800; font-size:18px; border-bottom:1px solid #444; padding-bottom:12px; margin-bottom:20px;">이번 주 비밸 계산 결과</h3>
        <div id="parsedResults"></div>
        <h4 style="margin-top: 35px; font-size: 13px; color: #94a3b8; margin-bottom:5px;">전체 인식된 텍스트 (로그 확인용)</h4>
        <textarea id="rawText" class="raw-text" style="width: 100%; height: 60px; background: #1e1e1e; color: #cbd5e1; border: 1px solid #444; border-radius: 6px; padding: 10px;" readonly></textarea>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz1kcyyTPhb_QUnvaowStm04IauYs1BBng0HTnO2LAPi9r4B5jX7_Do-ctHwkOXDHPX7w/exec";

        let dragonDB = {};
        let dragonList = [];
        let weeklyData = { base_stats: {}, buff: [], nerf: [] };
        
        let currentCalculatedBival = 0; 
        let currentTotalBuffCount = 0;
        let currentG1 = {}, currentG2 = {}, currentG3 = {}; 

        const modal = document.getElementById("leaderboardModal");
        const btn = document.getElementById("openLeaderboardBtn");
        const span = document.getElementById("closeModalBtn");

        btn.onclick = function() { modal.style.display = "block"; loadLeaderboard(); }
        span.onclick = function() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

        function toggleDetails(btnElement) {
            const detailRow = btnElement.closest('tr').nextElementSibling;
            if (detailRow.style.display === "none" || detailRow.style.display === "") {
                detailRow.style.display = "table-row";
                btnElement.innerText = "닫기 ▲";
            } else {
                detailRow.style.display = "none";
                btnElement.innerText = "상세 ▼";
            }
        }

        async function loadLeaderboard() {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = `<tr><td colspan="5" style="color:#94a3b8;">데이터를 불러오는 중입니다... ⏳</td></tr>`;
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                
                tbody.innerHTML = '';
                if(data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="color:#94a3b8;">아직 등록된 랭킹이 없습니다.</td></tr>`;
                    return;
                }

                data.forEach((row, index) => {
                    let medalHtml = `<span class="rank-td-cell">${index + 1}위</span>`;
                    if(index === 0) medalHtml = `<img src="./images/medal_1.png" class="leaderboard-medal-icon" alt="1위" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';"><span style="display:none;" class="rank-td-cell">1위</span>`;
                    if(index === 1) medalHtml = `<img src="./images/medal_2.png" class="leaderboard-medal-icon" alt="2위" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';"><span style="display:none;" class="rank-td-cell">2위</span>`;
                    if(index === 2) medalHtml = `<img src="./images/medal_3.png" class="leaderboard-medal-icon" alt="3위" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';"><span style="display:none;" class="rank-td-cell">3위</span>`;
                    let iconsHtml = '';
                    const dNames = [row.g1?.name, row.g2?.name, row.g3?.name];
                    dNames.forEach(dName => {
                        if(dName && !dName.startsWith("그룹 ")) {
                            iconsHtml += `<img src="./images/icons/${dName}.png" class="leaderboard-dragon-icon" onerror="this.style.display='none'">`;
                        }
                    });
                    
                    const buffCount = row.totalBuffCount || 0;
                    let buffClass = `buff-${buffCount}`;
                    if (buffCount > 6) buffClass = "buff-6"; 
                    const buffBadge = `<span class="buff-badge ${buffClass}">${buffCount}버프</span>`;
                    
                    const bivalText = `<span class="score-text">${Number(row.score).toLocaleString()}</span>`;
                    const g1Bival = (row.g1?.hp * row.g1?.atk * row.g1?.def) || 0;
                    const g2Bival = (row.g2?.hp * row.g2?.atk * row.g2?.def) || 0;

        function preprocessImageForOCR(imgSrc) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = img.width;
                    tempCanvas.height = img.height;
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCtx.drawImage(img, 0, 0);
                    const tempData = tempCtx.getImageData(0, 0, img.width, img.height).data;

                    const rowBrightness = new Float32Array(img.height);
                    const startX = Math.floor(img.width * 0.3);
                    const endX = Math.floor(img.width * 0.7);
                    const scanWidth = endX - startX;

                    for (let y = 0; y < img.height; y++) {
                        let sum = 0;
                        for (let x = startX; x < endX; x++) {
                            const i = (y * img.width + x) * 4;
                            sum += 0.299 * tempData[i] + 0.587 * tempData[i+1] + 0.114 * tempData[i+2];
                        }
                        rowBrightness[y] = sum / scanWidth;
                    }

                    const safeTop = Math.floor(img.height * 0.15);
                    const safeBottom = Math.floor(img.height * 0.85);

                    let statBottomY = safeBottom;
                    let statTopY = safeBottom;
                    let evalTopY = safeTop;

                    let phase = 0;
                    let darkHeight = 0;
                    let tempStatBottom = safeBottom;

                    for (let y = safeBottom; y >= safeTop; y--) {
                        let b = rowBrightness[y];

                        if (phase === 0) {
                            if (b > 115) phase = 1;
                        } 
                        else if (phase === 1) {
                            if (b < 105) {
                                phase = 2;
                                tempStatBottom = y;
                                darkHeight = 1;
                            }
                        } 
                        else if (phase === 2) {
                            if (b < 105) {
                                darkHeight++;
                            } else if (b > 115) { 
                                if (darkHeight > img.height * 0.045) {
                                    statBottomY = tempStatBottom;
                                    statTopY = y; 
                                    phase = 3;
                                } else {
                                    phase = 1;
                                }
                            }
                        } 
                        else if (phase === 3) {
                            if (statTopY - y > img.height * 0.015) {
                                if (b < 100) {
                                    evalTopY = y; 
                                    break;
                                }
                            }
                        }
                    }

                    const evalRowBrightness = new Float32Array(img.width);
                    for (let x = 0; x < img.width; x++) {
                        let sum = 0;
                        let count = 0;
                        for (let y = evalTopY; y < statTopY; y++) {
                            const i = (y * img.width + x) * 4;
                            sum += 0.299 * tempData[i] + 0.587 * tempData[i+1] + 0.114 * tempData[i+2];
                            count++;
                        }
                        evalRowBrightness[x] = count > 0 ? sum / count : 0;
                    }

                    let cropLeft = 0;
                    let cropRight = img.width;
                    for (let x = 0; x < Math.floor(img.width / 2); x++) {
                        if (evalRowBrightness[x] > 115) { cropLeft = x; break; }
                    }
                    for (let x = img.width - 1; x > Math.floor(img.width / 2); x--) {
                        if (evalRowBrightness[x] > 115) { cropRight = x; break; }
                    }

                    cropLeft = Math.max(0, cropLeft - 5);
                    cropRight = Math.min(img.width, cropRight + 5);
                    const cropW = cropRight - cropLeft;
                    const cropTop = Math.max(0, evalTopY - 2);
                    const cropBottom = Math.min(img.height, statBottomY + 2);
                    const cropH = cropBottom - cropTop;

                    const scale = 6;
                    const pad = 20;
                    const canvas = document.createElement('canvas');
                    canvas.width = (cropW + pad * 2) * scale;
                    canvas.height = (cropH + pad * 2) * scale;
                    const ctx = canvas.getContext('2d');

                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.imageSmoothingEnabled = false;
                    ctx.drawImage(img, cropLeft, cropTop, cropW, cropH, pad * scale, pad * scale, cropW * scale, cropH * scale);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    const splitY = (statTopY - cropTop + pad) * scale;

                    const contrast = 80; 
                    const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));

                    for (let y = 0; y < canvas.height; y++) {
                        const isEvalBox = y < splitY;
                        for (let x = 0; x < canvas.width; x++) {
                            const i = (y * canvas.width + x) * 4;
                            let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];

                            if (!isEvalBox) {
                                gray = 255 - gray;
                            }

                            gray = factor * (gray - 128) + 128;

                            if (gray > 255) gray = 255;
                            if (gray < 0) gray = 0;

                            data[i] = data[i+1] = data[i+2] = gray;
                        }
                    }

                    ctx.putImageData(imageData, 0, 0);
                    const dataUrl = canvas.toDataURL('image/png');
                    resolve(dataUrl);
                };
                img.src = imgSrc;
            });
        }

        function parseStatsFromOCRText(rawOCR) {
            let text = rawOCR;

            text = text.replace(/[Ss]/g, '5').replace(/B/g, '8');
            text = text.replace(/[OoDdQqg]/g, '0');
            text = text.replace(/[MNm]/g, '11');
            text = text.replace(/[Il|]/g, '1');

            text = text.replace(/([0-9]+)[a-zA-Z]+/g, '$1 ');
            text = text.replace(/[a-zA-Z]+([0-9]+)/g, ' $1');
        
            let allNums = (text.match(/\d+/g) || []).map(n => parseInt(n, 10));
        
            allNums = allNums.map(n => {
                if (n >= 10000 && n <= 19999) {
                    const candidate = n % 10000;
                    if (candidate >= 1000) return candidate; 
                }
                if (n >= 20000 && n <= 99999) {
                    const str = n.toString();
                    if(str[2] === str[3]) { 
                        return parseInt(str.slice(0,2) + str.slice(3), 10);
                    }
                }
                return n;
            });
        
            for (const line of text.split('\n')) {
                const lineNums = (line.match(/\d+/g) || [])
                    .map(n => parseInt(n, 10))
                    .filter(n => n >= 10 && n < 5000);
                if (lineNums.length === 9) return lineNums;
            }
        
            const evalPool = allNums.filter(n => n >= 4000 && n <= 12000);
            const statPool = allNums.filter(n => n >= 10  && n <  5000);
        
            if (evalPool.length >= 3 && statPool.length >= 9) {
                for (let s = 0; s <= statPool.length - 9; s++) {
                    const cand  = statPool.slice(s, s + 9);
                    let   score = 0;
                    for (let g = 0; g < 3; g++) {
                        const [hp, atk, def] = [cand[g*3], cand[g*3+1], cand[g*3+2]];
                        const calcEval = hp + (atk + def) * 4;
                        if (evalPool.some(e => Math.abs(e - calcEval) <= 30)) score++;
                    }
                    if (score >= 2) return cand;
                }
            }
        
            if (statPool.length >= 9) return statPool.slice(-9);
        
            return null;
        }

        extractBtn.addEventListener('click', async () => {
            extractBtn.disabled = true;
            statusDiv.innerHTML = "스탯 인식 중... ⏳";
            parsedResults.innerHTML = '';
            currentTotalBuffCount = 0; 
            
            const selectedNames = [
                document.getElementById('preInput1').value.trim() || "그룹 1",
                document.getElementById('preInput2').value.trim() || "그룹 2",
                document.getElementById('preInput3').value.trim() || "그룹 3"
            ];
            const selectedGrades = [
                document.getElementById('preGrade1').value,
                document.getElementById('preGrade2').value,
                document.getElementById('preGrade3').value
            ];

            try {
                let statNumbers = null;
            
                statusDiv.innerHTML = "OCR 스탯 인식 중... ⏳";
                const processedImgSrc = await preprocessImageForOCR(imagePreview.src);
                const worker = await Tesseract.createWorker('eng');
                
                await worker.setParameters({ tessedit_pageseg_mode: '6' }); 
                
                const ret = await worker.recognize(processedImgSrc);
                await worker.terminate();
                
                rawText.value = ret.data.text;
                statNumbers = parseStatsFromOCRText(ret.data.text);
            
                if (statNumbers && statNumbers.length === 9) {
                    const evalWarnings = [];
                    let healedCount = 0;

                    let evalMatches = [...rawText.value.matchAll(/(?:Eval|Eva|Evel)\s*[:;]?\s*(\d{4,5})/gi)];
                    let evalVals = evalMatches.map(m => parseInt(m[1], 10));

                    if (evalVals.length < 3) {
                        const fallbackMatches = rawText.value.match(/\b[4-9]\d{3}\b|\b1[0-2]\d{3}\b/g) || [];
                        evalVals = fallbackMatches.map(n => parseInt(n, 10)).filter(n => n >= 4000 && n <= 12000);
                        if (evalVals.length > 3) evalVals = evalVals.slice(0, 3);
                    }

                    if (evalVals.length === 3) {
                        for (let g = 0; g < 3; g++) {
                            let hp = statNumbers[g*3];
                            let atk = statNumbers[g*3+1];
                            let def = statNumbers[g*3+2];

                            const calcEval = hp + (atk + def) * 4;
                            const realEval = evalVals[g];

                            if (calcEval !== realEval) {
                                const expectedHp = realEval - ((atk + def) * 4);
                                const expectedAtk = (realEval - hp) / 4 - def;
                                const expectedDef = (realEval - hp) / 4 - atk;

                                let healed = false;

                                if (expectedHp >= 1000 && expectedHp <= 6000 && 
                                    atk >= 200 && atk <= 1500 && def >= 200 && def <= 1500) {
                                    statNumbers[g*3] = expectedHp;
                                    evalWarnings.push(`그룹 ${g+1} HP복구(${hp}➔${expectedHp})`);
                                    healed = true;
                                }
                                
                                else if (!healed && Number.isInteger(expectedAtk) && expectedAtk >= 200 && expectedAtk <= 1500 &&
                                         hp >= 1000 && hp <= 6000 && def >= 200 && def <= 1500) {
                                    statNumbers[g*3+1] = expectedAtk;
                                    evalWarnings.push(`그룹 ${g+1} ATK복구(${atk}➔${expectedAtk})`);
                                    healed = true;
                                }

                                else if (!healed && Number.isInteger(expectedDef) && expectedDef >= 200 && expectedDef <= 1500 &&
                                         hp >= 1000 && hp <= 6000 && atk >= 200 && atk <= 1500) {
                                    statNumbers[g*3+2] = expectedDef;
                                    evalWarnings.push(`그룹 ${g+1} DEF복구(${def}➔${expectedDef})`);
                                    healed = true;
                                }

                                if (healed) {
                                    healedCount++;
                                } else {
                                    evalWarnings.push(`그룹 ${g+1} 복구 불가`);
                                }
                            }
                        }
                    } else {
                        for (let g = 0; g < 3; g++) {
                            const hp = statNumbers[g*3], atk = statNumbers[g*3+1], def = statNumbers[g*3+2];
                            const calcEval = hp + (atk + def) * 4;
                            if (evalVals.length > 0) {
                                const nearestEval = evalVals.reduce((a, b) => Math.abs(a - calcEval) < Math.abs(b - calcEval) ? a : b);
                                if (Math.abs(nearestEval - calcEval) > 50) evalWarnings.push(`그룹 ${g+1} 수치 불일치`);
                            }
                        }
                    }

                    if (evalWarnings.length > 0) {
                        if (healedCount > 0) {
                            statusDiv.innerHTML = `✨ AI 인식 수정 완료: ${evalWarnings.join(', ')}`;
                            statusDiv.style.color = "#4ade80"; 
                        } else {
                            statusDiv.innerHTML = `⚠️ 인식 불일치: ${evalWarnings.join(', ')}`;
                            statusDiv.style.color = "#fca5a5";

                        statusDiv.innerHTML = "계산 완료 ✅";
                        statusDiv.style.color = "#94a3b8";

                    let html = '<div class="groups-wrapper">';

                    let totalBival = 0;
                    
                    for (let i = 0; i < 9; i += 3) {

                                                if (n.stat === 'hp') buff_hp -= amount;

                                <div class="bival-box">
                                    <span class="bival-label">📊 비밸 (버프 적용):</span>
                                    <span class="bival-score">${groupBival.toLocaleString()}</span>
                                </div>
                            </div>
                        `;
                    }
                    html += '</div>';
                    currentCalculatedBival = totalBival;

                    html += `
                        <div style="margin-top: 25px; text-align: center;">
                            <button class="toggle-debug-btn" onclick="const wrapper = document.getElementById('debugImageWrapper'); wrapper.style.display = wrapper.style.display === 'none' ? 'block' : 'none'; this.innerText = wrapper.style.display === 'none' ? '스탯 확인용 이미지 표시하기 ▼' : '스탯 확인용 이미지 닫기 ▲';">스탯 확인용 이미지 표시하기 ▼</button>
                            <div id="debugImageWrapper" style="display: none; margin-top: 15px;">
                                <img src="${processedImgSrc}" style="max-width: 100%; border: 1px solid #444; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
                            </div>
                        </div>
                    `;

                    html += `
                        <div class="total-bival-box">
                            🏆 이번 주 총합 비밸
                            <span>${totalBival.toLocaleString()}</span>
                            <div class="submit-section">
                                <input type="text" id="nicknameInput" placeholder="닉네임 입력 (최대 10자)" maxlength="10">
                                <button id="submitScoreBtn" onclick="submitScoreToDB()">주간 랭킹에 기록 등록하기</button>
                            </div>
                        </div>
                    `;
                    parsedResults.innerHTML = html;
                } else {
                    parsedResults.innerHTML = `
                        <div style="background:#3a1616; color:#fca5a5; padding:15px; border-radius:8px; text-align:center; font-weight:bold; margin-bottom: 20px;">
                            ❌ 스탯을 안정적으로 추출하지 못했습니다.<br>스크린샷이 덱 설정 화면 전체를 포함하는지 확인해 주세요.
                        </div>
                        <div style="text-align: center;">
                            <button class="toggle-debug-btn" onclick="const wrapper = document.getElementById('debugImageWrapper'); wrapper.style.display = wrapper.style.display === 'none' ? 'block' : 'none'; this.innerText = wrapper.style.display === 'none' ? '스탯 확인용 이미지 표시하기 ▼' : '스탯 확인용 이미지 닫기 ▲';">스탯 확인용 이미지 표시하기 ▼</button>
                            <div id="debugImageWrapper" style="display: none; margin-top: 15px;">
                                <img src="${processedImgSrc}" style="max-width: 100%; border: 1px solid #444; border-radius: 8px;">
                            </div>
                        </div>
                    `;
                    statusDiv.innerHTML = "인식 실패 ❌";
                }
                
                resultSection.style.display = 'block';

            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = "오류가 발생했습니다. 관리자에게 문의 해주세요.";
            } finally {
                extractBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
